<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ library_title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=20260428A">
  <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
</head>

<body data-bg-api="{{ bg_api }}">
  <main class="container">
    <h1>{{ library_title }}</h1>

    <div class="form-group">
      <label>选择分类</label>
      <div class="folder-grid" id="folderGrid">
        {% for category in categories %}
        <button
          class="folder-btn{% if loop.first %} active{% endif %}"
          type="button"
          data-category="{{ category.key }}"
          data-label="{{ category.label }}"
        >
          <div class="folder-title">{{ category.label }}</div>
        </button>
        {% endfor %}
      </div>
      <div class="folder-current" id="folderCurrent">当前分类：{{ initial_category_label }}</div>
    </div>

    <div class="form-group">
      <label for="name">图片名称</label>
      <input type="text" id="name" placeholder="可选；单张上传时可手动指定，不填则使用文件名">
    </div>

    <div class="form-group">
      <label for="image">选择图片（支持多选）</label>
      <input type="file" id="image" accept="image/*" multiple>
    </div>

    <div class="btn-row">
      <a class="upload-btn link-btn" href="/editor" target="_blank">图标编辑</a>
      <button class="upload-btn" onclick="uploadSingle()">上传单张</button>
      <button class="upload-btn" onclick="uploadBatch()">批量上传</button>
    </div>

    <div id="progressWrap" class="progress-wrap" style="display:none;">
      <div class="progress-top">
        <span id="progressText">0/0</span>
        <span id="progressFile" class="progress-file"></span>
      </div>
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width:0%"></div>
      </div>
    </div>

    <div id="batchPreview" class="batch-preview" style="display:none;">
      <div class="preview-title">批量上传预览</div>
      <ul id="previewList" class="preview-list"></ul>
    </div>

    <div id="message"></div>
    <ul id="resultList"></ul>

    <p class="centered-link">
      <a href="{{ url_for('icons_all_json') }}" target="_blank">聚合 JSON</a>
      <a href="{{ url_for('icons_circle_json') }}" target="_blank">圆形 JSON</a>
      <a href="{{ url_for('icons_square_json') }}" target="_blank">方形 JSON</a>
      <a href="{{ url_for('icons_transparent_json') }}" target="_blank">透明 JSON</a>
      {% if admin_enabled %}
      <a href="/manage" target="_blank">管理后台</a>
      {% endif %}
    </p>
  </main>

  <script src="{{ url_for('static', filename='js/script.js') }}?v=20260428A"></script>
</body>
</html>
