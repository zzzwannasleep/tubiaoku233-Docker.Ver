<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <title>{{ library_title }} 管理后台</title>
  <link rel="icon" href="{{ url_for('static', filename='favicon.png') }}" type="image/png">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/manage.css') }}?v=20260428B">
</head>

<body class="m-body">
  <div class="m-bg" id="mBg"></div>
  <div class="m-overlay"></div>

  <main class="m-wrap">
    <header class="m-top">
      <div class="m-brand">
        <div class="m-logo">库</div>
        <div>
          <div class="m-title">{{ library_title }} 管理后台</div>
          <div class="m-sub">本地文件管理 · 本地 JSON 索引</div>
        </div>
      </div>
      <div class="m-actions">
        <a class="m-link" target="_blank" href="{{ icons_json }}">打开 icons.json</a>
        <a class="m-link" href="/">上传页</a>
        <a class="m-link" href="/editor">编辑页</a>
        <button class="m-btn ghost" id="btnBg">换背景</button>
      </div>
    </header>

    <section class="m-card" id="loginCard">
      <div class="m-card-title">登录</div>
      <div class="m-row">
        <input class="m-input" id="pwd" type="password" placeholder="管理密码"/>
        <button class="m-btn" id="btnLogin">登录</button>
      </div>
      <div class="m-hint" id="loginMsg"></div>
    </section>

    <section class="m-card hidden" id="panel">
      <div class="m-bar">
        <div class="m-toolbar">
          <div class="m-search-row">
            <input class="m-input" id="q" placeholder="搜索名称 / 文件名 / 分类"/>
            <button class="m-btn" id="btnLoad">刷新</button>
          </div>

          <div class="m-pager-row">
            <button class="m-btn ghost" id="btnPrev">上一页</button>
            <span class="pill" id="pageInfo">Page -</span>
            <button class="m-btn ghost" id="btnNext">下一页</button>
            <span class="pill pill-label">跳到</span>
            <input class="m-input m-input--jump" id="jump" placeholder="页码"/>
            <button class="m-btn ghost" id="btnJump">跳转</button>
          </div>

          <div class="m-action-row">
            <button class="m-btn danger" id="btnBulk">批量删除</button>
            <button class="m-btn ghost" id="btnLogout">退出</button>
          </div>
        </div>

        <div class="m-meta">
          <span class="pill" id="catalogInfo"></span>
          <span class="pill" id="storageInfo"></span>
          <span class="pill">删除时会同步移除本地文件和 JSON 记录</span>
        </div>
      </div>

      <div class="m-table-wrap">
        <table class="m-table">
          <thead>
            <tr>
              <th style="width:52px;">选</th>
              <th style="width:140px;">预览</th>
              <th>URL</th>
              <th style="width:120px;">分类</th>
              <th style="width:240px;">文件</th>
              <th style="width:180px;">名称</th>
              <th style="width:120px;">操作</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>

      <div class="m-mobile-list" id="mobileRows"></div>

      <div class="m-foot">
        支持按名称、文件名、分类搜索。若需要固定完整外链，请在部署时设置 `PUBLIC_BASE_URL`。
      </div>
    </section>
  </main>

<script>
  const BG_API = "{{ bg_api }}";
  const bg = document.getElementById("mBg");

  let bgLock = false;
  function setBg() {
    if (bgLock) return;
    bgLock = true;
    setTimeout(() => (bgLock = false), 300);

    if (!BG_API) {
      bg.style.backgroundImage = "";
      return;
    }

    const join = BG_API.includes("?") ? "&" : "?";
    bg.style.backgroundImage = `url("${BG_API}${join}t=${Date.now()}")`;
  }

  setBg();
  document.getElementById("btnBg").onclick = setBg;
  bg.addEventListener("click", setBg);
  window.addEventListener("click", (event) => {
    if (event.shiftKey) setBg();
  });

  const loginCard = document.getElementById("loginCard");
  const panel = document.getElementById("panel");
  const rows = document.getElementById("rows");
  const mobileRows = document.getElementById("mobileRows");
  const pageInfo = document.getElementById("pageInfo");
  const catalogInfo = document.getElementById("catalogInfo");
  const storageInfo = document.getElementById("storageInfo");
  const selectedIndexes = new Set();

  let currentItems = [];
  let currentPage = 1;
  let lastPage = 1;

  function escapeHtml(value) {
    return String(value ?? "").replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#39;",
    }[char]));
  }

  function syncSelectionState(index, checked) {
    if (checked) {
      selectedIndexes.add(index);
    } else {
      selectedIndexes.delete(index);
    }

    document.querySelectorAll(`input[data-select="${index}"]`).forEach((input) => {
      input.checked = checked;
    });
  }

  async function login() {
    const password = document.getElementById("pwd").value;
    const response = await fetch("/api/admin/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password })
    });

    const data = await response.json().catch(() => ({ ok: false, message: "bad json" }));
    const msg = document.getElementById("loginMsg");
    if (!data.ok) {
      msg.textContent = data.message || "登录失败";
      msg.className = "m-hint bad";
      return;
    }

    msg.textContent = "";
    loginCard.classList.add("hidden");
    panel.classList.remove("hidden");
    await loadImages(true);
  }

  async function logout() {
    await fetch("/api/admin/logout", { method: "POST" });
    location.reload();
  }

  function getSelected() {
    return Array.from(selectedIndexes)
      .sort((a, b) => a - b)
      .map((index) => currentItems[index])
      .filter(Boolean);
  }

  function render(items) {
    rows.innerHTML = "";
    if (mobileRows) mobileRows.innerHTML = "";
    currentItems = items || [];
    selectedIndexes.clear();

    if (!currentItems.length) {
      rows.innerHTML = `<tr><td colspan="7"><div class="m-empty">没有符合条件的记录。</div></td></tr>`;
      if (mobileRows) {
        mobileRows.innerHTML = `<div class="m-empty">没有符合条件的记录。</div>`;
      }
      return;
    }

    currentItems.forEach((item, index) => {
      const safeUrl = escapeHtml(item.url || "");
      const safeCategory = escapeHtml(item.category_label || item.category || "-");
      const safeFilename = escapeHtml(item.filename || "");
      const safePath = escapeHtml(item.path || "");
      const safeName = escapeHtml(item.icon_name || "未命名图标");
      const previewAlt = escapeHtml(item.icon_name || item.filename || "图标预览");
      const stateTag = item.exists
        ? `<span class="tag ok">文件存在</span>`
        : `<span class="tag bad">文件缺失</span>`;
      const fileCell = item.filename
        ? `<span class="mono">${safeFilename}</span><div class="mini">${safePath}</div>`
        : `<span class="tag bad">外部记录</span>`;
      const previewCell = item.url
        ? `<img class="thumb" loading="lazy" src="${safeUrl}" alt="${previewAlt}"/>`
        : `<div class="thumb thumb--empty">暂无预览</div>`;
      const urlCell = item.url
        ? `<a class="a" href="${safeUrl}" target="_blank">${safeUrl}</a>`
        : `<span class="mini">无外链</span>`;

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td data-label="选择"><input class="chk" type="checkbox" data-select="${index}"/></td>
        <td data-label="预览">${previewCell}</td>
        <td data-label="URL">${urlCell}</td>
        <td data-label="分类"><span class="tag ok">${safeCategory}</span><div class="mini">${stateTag}</div></td>
        <td data-label="文件">${fileCell}</td>
        <td data-label="名称">${safeName}</td>
        <td data-label="操作"><button class="m-btn tiny danger" data-del="${index}">删除</button></td>
      `;
      rows.appendChild(tr);

      if (mobileRows) {
        const article = document.createElement("article");
        article.className = "m-item-card";
        article.innerHTML = `
          <div class="m-item-top">
            <label class="m-checkline">
              <input class="chk" type="checkbox" data-select="${index}"/>
              <span>选择记录</span>
            </label>
            <button class="m-btn tiny danger" data-del="${index}">删除</button>
          </div>

          <div class="m-item-preview">${previewCell}</div>

          <div class="m-item-body">
            <div class="m-item-title">${safeName}</div>
            <div class="m-item-grid">
              <div class="m-field">
                <span class="m-field-label">分类</span>
                <div class="m-field-value">
                  <span class="tag ok">${safeCategory}</span>
                  <div class="mini">${stateTag}</div>
                </div>
              </div>

              <div class="m-field">
                <span class="m-field-label">文件</span>
                <div class="m-field-value">${fileCell}</div>
              </div>

              <div class="m-field m-field--full">
                <span class="m-field-label">URL</span>
                <div class="m-field-value">${urlCell}</div>
              </div>
            </div>
          </div>
        `;
        mobileRows.appendChild(article);
      }
    });

    document.querySelectorAll("input[data-select]").forEach((input) => {
      input.addEventListener("change", () => {
        const index = Number(input.dataset.select);
        syncSelectionState(index, input.checked);
      });
    });

    document.querySelectorAll("button[data-del]").forEach((btn) => {
      btn.onclick = async () => {
        const item = currentItems[Number(btn.dataset.del)];
        if (!item) return;
        if (!confirm("确认删除这条记录吗？")) return;
        await doDelete([item]);
      };
    });
  }

  async function loadImages(resetPage = false) {
    if (resetPage) currentPage = 1;

    const q = document.getElementById("q").value || "";
    const response = await fetch(`/api/admin/images?page=${currentPage}&q=${encodeURIComponent(q)}`);

    if (response.status === 401) {
      alert("未登录或登录已过期");
      location.reload();
      return;
    }

    const data = await response.json().catch(() => ({ ok: false, message: "bad json" }));
    if (!data.ok) {
      alert(data.message || "加载失败");
      return;
    }

    const pager = data.pager || {};
    const stats = data.catalog_stats || {};
    const byCategory = stats.by_category || {};

    lastPage = Number(pager.last_page || 1);
    currentPage = Number(pager.page || 1);

    pageInfo.textContent = `Page ${currentPage} / ${lastPage}`;
    catalogInfo.textContent = `记录总数: ${stats.total ?? 0}`;
    storageInfo.textContent = `默认 ${byCategory.default ?? 0} · 方形 ${byCategory.square ?? 0} · 圆形 ${byCategory.circle ?? 0} · 透明 ${byCategory.transparent ?? 0}`;

    render(data.items || []);
  }

  async function doDelete(items) {
    const payload = {
      items: items.map((item) => ({
        key: item.key,
        path: item.path,
        url: item.url,
        category: item.category
      }))
    };

    const response = await fetch("/api/admin/delete", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    const data = await response.json().catch(() => ({ ok: false, message: "bad json" }));
    if (!data.ok) {
      alert(data.message || "删除失败");
      return;
    }

    const failed = (data.results || []).filter((item) => !item.ok);
    const summary = data.summary || {};

    if (failed.length) {
      alert(
        `有 ${failed.length} 条删除失败：\n` +
        failed.map((item) => `${item.path || item.category}: ${item.error}`).join("\n")
      );
    } else {
      alert(`删除完成：移除记录 ${summary.removed ?? 0} 条，删除文件 ${summary.deleted_files ?? 0} 个。`);
    }

    await loadImages(false);
  }

  async function bulkDelete() {
    const selected = getSelected();
    if (!selected.length) {
      alert("请先勾选要删除的图片");
      return;
    }
    if (!confirm(`确认批量删除 ${selected.length} 条记录吗？`)) return;
    await doDelete(selected);
  }

  document.getElementById("btnLogin").onclick = login;
  document.getElementById("btnLogout").onclick = logout;
  document.getElementById("btnLoad").onclick = () => loadImages(true);
  document.getElementById("btnBulk").onclick = bulkDelete;

  document.getElementById("pwd").addEventListener("keydown", (event) => {
    if (event.key === "Enter") login();
  });

  document.getElementById("q").addEventListener("keydown", (event) => {
    if (event.key === "Enter") loadImages(true);
  });

  document.getElementById("btnPrev").onclick = async () => {
    if (currentPage <= 1) return;
    currentPage -= 1;
    await loadImages(false);
  };

  document.getElementById("btnNext").onclick = async () => {
    if (currentPage >= lastPage) return;
    currentPage += 1;
    await loadImages(false);
  };

  document.getElementById("btnJump").onclick = async () => {
    const value = parseInt((document.getElementById("jump").value || "").trim(), 10);
    if (!value || value < 1) return;
    currentPage = Math.min(value, lastPage || value);
    await loadImages(false);
  };

  document.getElementById("jump").addEventListener("keydown", (event) => {
    if (event.key === "Enter") document.getElementById("btnJump").click();
  });
</script>
</body>
</html>
